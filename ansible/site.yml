- name: Base OS + zram (all nodes)
  hosts: all
  become: true
  roles:
    - { role: base, tags: [base] }
    - { role: zram, tags: [zram] }

- name: k3s server
  hosts: server
  become: true
  roles:
    - { role: k3s_server, tags: [k3s] }

- name: k3s agents
  hosts: agents
  become: true
  roles:
    - { role: k3s_agent, tags: [k3s] }
