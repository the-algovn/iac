# Secrets live in OpenBao (LXC on the Proxmox host) and reach the cluster via
# External Secrets Operator — the repo holds only ExternalSecret references,
# never secret material.
[extend]
useDefault = true

[allowlist]
description = "Historical SealedSecret manifests (removed 2026-07-15, sealing key destroyed — blobs in old commits are undecryptable)"
paths = ['''.*-sealed\.yaml$''']
