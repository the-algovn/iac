apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-radio
  namespace: radio
spec:
  ingressClassName: kong
  rules:
    - host: algovn.com
      http:
        paths:
          - path: /radio
            pathType: Prefix
            backend:
              service:
                name: web-radio
                port: { number: 80 }
  tls:
    - hosts: [algovn.com]
