apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: algovn
  kubernetes.yaml: |
    mode: cluster
  services.yaml: |
    - Platform:
        - Argo CD:
            href: https://argocd.algovn.com
            description: GitOps
        - Grafana:
            href: https://grafana.algovn.com
            description: Metrics + logs
        - Uptime Kuma:
            href: https://uptime.algovn.com
            description: Uptime monitoring
  widgets.yaml: |
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
  bookmarks.yaml: ""
  docker.yaml: ""
