apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - amqp-creds-sealed.yaml
  - registry-creds-sealed.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - ingress-events.yaml
  - ingress-the-button.yaml
  - vmservicescrape.yaml
  - rate-limit-plugin.yaml
  - rl-events-plugin.yaml
  - rl-button-plugin.yaml
configMapGenerator:
  - name: api-registrations
    namespace: api-control-plane
    files:
      - registrations/demo.yaml
      - registrations/the-button.yaml
generatorOptions:
  disableNameSuffixHash: true # stable name => ConfigMap updates hot-reload in place, no pod restart
images:
  - name: ghcr.io/the-algovn/api-control-plane
    newTag: main
    newName: ghcr.io/the-algovn/api-control-plane
    digest: sha256:df381a55fc1e756f9da2557b3a99684af00f5460372a684f0e132fdda926f78b
