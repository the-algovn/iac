apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-control-plane
  namespace: api-control-plane
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: api-control-plane }
  template:
    metadata:
      labels: { app: api-control-plane }
    spec:
      containers:
        - name: api-control-plane
          image: ghcr.io/the-algovn/api-control-plane:main
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 9091, name: metrics }
          env:
            - { name: REGISTRATIONS_DIR, value: /etc/api-registrations }
            - { name: ISSUER, value: "https://id.algovn.com" }
            # Accepted aud values in Zitadel tokens: the-thing project id, the-button-web
            # client id, algovn-web project id, console client id, radio project id,
            # radio-web client id (mirrors dev/Tiltfile).
            - { name: AUDIENCE, value: "381978168812110193,381980626372329841,382008146408767857,382008149395112305,382858782499144049,382858783153455473" }
            - { name: CORS_ORIGINS, value: "https://*.algovn.com,https://algovn.com" }
            - { name: GOMEMLIMIT, value: 900MiB }
            - { name: SSE_MAX_CONNS, value: "15000" }
            - { name: KAFKA_BROKERS, value: "redpanda.redpanda.svc.cluster.local:9092" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
          volumeMounts:
            - { name: registrations, mountPath: /etc/api-registrations, readOnly: true }
      volumes:
        - name: registrations
          configMap: { name: api-registrations }
      imagePullSecrets:
        - name: registry-creds
