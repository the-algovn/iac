apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-events
  namespace: api-control-plane
  annotations:
    konghq.com/response-buffering: "false"
    konghq.com/plugins: rl-events
spec:
  ingressClassName: kong
  rules:
    - host: api.algovn.com
      http:
        paths:
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: api-control-plane
                port: { number: 80 }
  tls:
    - hosts: [api.algovn.com]
