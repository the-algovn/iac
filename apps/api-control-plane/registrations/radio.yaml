# Prod twin of dev/registrations/radio.yaml — keep the route list in sync.
prefix: /radio
upstream: dns:///radio-service.radio-service.svc.cluster.local:9290
defaultRule: role:admin
routes:
  - { method: algovn.radio.v1.RadioService/CreatePlaylist,    verb: POST, path: /playlists/create,       rule: role:admin }
  - { method: algovn.radio.v1.RadioService/ListPlaylists,     verb: GET,  path: /playlists,              rule: role:admin }
  - { method: algovn.radio.v1.RadioService/GetPlaylist,       verb: POST, path: /playlists/get,          rule: role:admin }
  - { method: algovn.radio.v1.RadioService/RenamePlaylist,    verb: POST, path: /playlists/rename,       rule: role:admin }
  - { method: algovn.radio.v1.RadioService/DeletePlaylist,    verb: POST, path: /playlists/delete,       rule: role:admin }
  - { method: algovn.radio.v1.RadioService/AddTrack,          verb: POST, path: /playlists/add-track,    rule: role:admin }
  - { method: algovn.radio.v1.RadioService/RemoveTrack,       verb: POST, path: /playlists/remove-track, rule: role:admin }
  - { method: algovn.radio.v1.RadioService/ReorderTracks,     verb: POST, path: /playlists/reorder,      rule: role:admin }
  - { method: algovn.radio.v1.RadioService/GetStation,        verb: GET,  path: /station,                rule: role:admin }
  - { method: algovn.radio.v1.RadioService/SetActivePlaylist, verb: POST, path: /station/active,         rule: role:admin }
  - { method: algovn.radio.v1.RadioService/GoOnAir,           verb: POST, path: /station/on-air,         rule: role:admin }
  - { method: algovn.radio.v1.RadioService/GoOffAir,          verb: POST, path: /station/off-air,        rule: role:admin }
  - { method: algovn.radio.v1.RadioService/GetNowPlaying, verb: GET,  path: /now-playing, rule: anonymous }
  - { method: algovn.radio.v1.RadioService/GetQueue,      verb: GET,  path: /queue,       rule: anonymous }
  - { method: algovn.radio.v1.RadioService/GetHistory,    verb: GET,  path: /history,     rule: anonymous }
  - { method: algovn.radio.v1.RadioService/Heartbeat,     verb: POST, path: /heartbeat,   rule: anonymous }
channels:
  - name: radio.nowplaying
    rule: anonymous
  - name: radio.queue
    rule: anonymous
