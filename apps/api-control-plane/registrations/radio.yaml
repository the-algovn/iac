# Prod twin of dev/registrations/radio.yaml — keep the route list in sync.
# v1.2 replaces the playlist surface with station-console moderation.
prefix: /radio
upstream: dns:///radio-service.radio-service.svc.cluster.local:9290
defaultRule: role:admin
routes:
  - { method: algovn.radio.v1.RadioService/GetStation,        verb: GET,  path: /station,                rule: role:admin }
  - { method: algovn.radio.v1.RadioService/GoOnAir,           verb: POST, path: /station/on-air,         rule: role:admin }
  - { method: algovn.radio.v1.RadioService/GoOffAir,          verb: POST, path: /station/off-air,        rule: role:admin }
  - { method: algovn.radio.v1.RadioService/GetNowPlaying, verb: GET,  path: /now-playing, rule: anonymous }
  - { method: algovn.radio.v1.RadioService/GetQueue,      verb: GET,  path: /queue,       rule: anonymous }
  - { method: algovn.radio.v1.RadioService/GetHistory,    verb: GET,  path: /history,     rule: anonymous }
  - { method: algovn.radio.v1.RadioService/Heartbeat,     verb: POST, path: /heartbeat,   rule: anonymous }
  - { method: algovn.radio.v1.RadioService/SearchCandidates, verb: POST, path: /search,        rule: authenticated, deadline: 30s }
  - { method: algovn.radio.v1.RadioService/RequestTrack,     verb: POST, path: /requests,      rule: authenticated }
  - { method: algovn.radio.v1.RadioService/ListMyRequests,   verb: GET,  path: /requests/mine, rule: authenticated }
  - { method: algovn.radio.v1.RadioService/ListStationRequests, verb: GET,  path: /station/requests,         rule: role:admin }
  - { method: algovn.radio.v1.RadioService/ReorderRequests,     verb: POST, path: /station/requests/reorder, rule: role:admin }
  - { method: algovn.radio.v1.RadioService/RemoveRequest,       verb: POST, path: /station/requests/remove,  rule: role:admin }
  - { method: algovn.radio.v1.RadioService/SkipTrack,           verb: POST, path: /station/skip,             rule: role:admin }
  - { method: algovn.radio.v1.RadioService/SetAIEnabled,        verb: POST, path: /station/ai,               rule: role:admin }
channels:
  - name: radio.nowplaying
    rule: anonymous
  - name: radio.queue
    rule: anonymous
