apiVersion: apps/v1
kind: Deployment
metadata:
  name: the-button-worker
  namespace: the-button
spec:
  # Single replica by design: the snapshot loop + cold-start Restore are
  # single-flighted (design §7). The two Kafka consumer groups + counter/leader
  # tick loops all live in this one process. A maxSurge rollout briefly runs two
  # workers: duplicate sse frames are cosmetic, INCRBY is idempotent (seen: key),
  # milestone claims dedupe via SETNX — but the SNAPSHOT is the reason to keep it 1.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: the-button-worker }
  template:
    metadata:
      labels: { app: the-button-worker }
    spec:
      containers:
        - name: the-button-worker
          image: ghcr.io/the-algovn/the-button-service:main
          command: ["/the-button-worker"]
          ports:
            - { containerPort: 9091, name: metrics }
          env:
            - { name: METRICS_ADDR, value: ":9091" }
            - { name: KAFKA_BROKERS, value: "redpanda.redpanda.svc.cluster.local:9092" }
            - name: PG_URL
              valueFrom: { secretKeyRef: { name: pg-the-button, key: uri } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: redis-creds, key: url } }
          readinessProbe:
            httpGet: { path: /healthz, port: 9091 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 9091 }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 100m, memory: 64Mi }
            limits: { memory: 256Mi }
      imagePullSecrets:
        - name: registry-creds
