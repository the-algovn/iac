apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: the-button-service
  namespace: the-button
spec:
  # the-button-service trusts an UNVERIFIED base64 decode of the gateway's JWT
  # for identity (it assumes only api-control-plane can reach it) — this
  # policy makes that assumption enforced instead of merely convention.
  # Egress: the api needs Postgres, Redis, and DNS, plus Kafka (Redpanda) —
  # it now produces click events to Kafka for the worker to consume.
  podSelector:
    matchLabels: { app: the-button-service }
  policyTypes: [Ingress, Egress]
  ingress:
    # gRPC: api-control-plane only.
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: api-control-plane }
          podSelector:
            matchLabels: { app: api-control-plane }
      ports:
        - { port: 9090, protocol: TCP }
    # metrics: vmagent (monitoring namespace) only, for VMServiceScrape.
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: monitoring }
          podSelector:
            matchLabels: { app.kubernetes.io/name: vmagent }
      ports:
        - { port: 9091, protocol: TCP }
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: postgres }
      ports:
        - { port: 5432, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: redis }
      ports:
        - { port: 6379, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: redpanda }
      ports:
        - { port: 9092, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: the-button-migrate
  namespace: the-button
spec:
  # The PreSync migration Job: egress to Postgres + DNS only, no ingress.
  # There is no default-deny in this namespace, so the Job would reach Postgres
  # without this policy — it exists because every other pod here is locked down
  # and an unrestricted pod would be an inconsistency, not a feature.
  podSelector:
    matchLabels: { app: the-button-migrate }
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: postgres }
      ports:
        - { port: 5432, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: the-button-worker
  namespace: the-button
spec:
  # Worker: no ingress except metrics scrape; egress to Postgres (snapshot),
  # Redis (counters/leaderboard/idempotency), Kafka (Redpanda, both consume
  # and produce sse.* frames), DNS.
  podSelector:
    matchLabels: { app: the-button-worker }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: monitoring }
          podSelector:
            matchLabels: { app.kubernetes.io/name: vmagent }
      ports:
        - { port: 9091, protocol: TCP }
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: postgres }
      ports:
        - { port: 5432, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: redis }
      ports:
        - { port: 6379, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: redpanda }
      ports:
        - { port: 9092, protocol: TCP }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: the-button-topics
  namespace: the-button
spec:
  # The PreSync topic-provisioning Job: egress to Kafka (Redpanda) + DNS only,
  # no ingress. There is no default-deny in this namespace, so the Job would
  # reach Redpanda without this policy — it exists because every other pod
  # here is locked down and an unrestricted pod would be an inconsistency,
  # not a feature.
  podSelector:
    matchLabels: { app: the-button-topics }
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: redpanda }
      ports:
        - { port: 9092, protocol: TCP }
