apiVersion: batch/v1
kind: Job
metadata:
  name: the-button-topics
  namespace: the-button
  annotations:
    # PreSync: topics exist before the service/worker pods roll and start
    # producing/consuming. Idempotent — rpk topic create is a no-op if present.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600   # the readiness wait may sit through a cold Redpanda boot
  template:
    metadata:
      labels: { app: the-button-topics }
    spec:
      restartPolicy: Never
      containers:
        - name: topics
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              B=redpanda.redpanda.svc.cluster.local:9092
              # Wait for the broker to answer the KAFKA API (port 9092) — rpk
              # cluster info speaks Kafka to --brokers, unlike `rpk cluster health`
              # which hits the Admin API on localhost:9644 and would never succeed
              # from here.
              until rpk cluster info --brokers $B >/dev/null 2>&1; do
                echo "waiting for redpanda..."; sleep 5
              done
              # || true keeps re-runs idempotent (create-on-existing exits non-zero).
              rpk topic create clicks -p 1 -r 1 -c retention.ms=300000 --brokers $B || true
              rpk topic create sse.counter sse.leaderboard sse.user -p 1 -r 1 -c retention.ms=60000 --brokers $B || true
              # Real success gate: describe FAILS (non-zero, no `|| true`) if any
              # topic is missing — so a swallowed create above can't pass PreSync.
              rpk topic describe clicks sse.counter sse.leaderboard sse.user --brokers $B
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 128Mi }
