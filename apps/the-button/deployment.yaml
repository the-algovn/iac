apiVersion: apps/v1
kind: Deployment
metadata:
  name: the-button-service
  namespace: the-button
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: the-button-service }
  template:
    metadata:
      labels: { app: the-button-service }
    spec:
      # Prefer (not require) spreading the 2 replicas across nodes. Today
      # there is only ONE schedulable amd64 worker (w1; the Pi control-plane
      # node can't run amd64 images), so a hard constraint would leave a pod
      # Pending forever — ScheduleAnyway makes this a no-op today and takes
      # effect automatically once a second amd64 worker joins the cluster.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app: the-button-service }
      containers:
        - name: the-button-service
          image: ghcr.io/the-algovn/the-button-service:main
          ports:
            - { containerPort: 9090, name: grpc }
            - { containerPort: 9091, name: metrics }
          env:
            - { name: LISTEN_ADDR, value: ":9090" }
            - { name: METRICS_ADDR, value: ":9091" }
            - { name: POW_W0, value: "2048" }
            - name: PG_URL
              valueFrom: { secretKeyRef: { name: pg-the-button, key: uri } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: redis-creds, key: url } }
            - name: POW_SECRET
              valueFrom: { secretKeyRef: { name: pow-secret, key: key } }
          readinessProbe:
            grpc: { port: 9090 }
            initialDelaySeconds: 5
          livenessProbe:
            grpc: { port: 9090 }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 256Mi }
      imagePullSecrets:
        - name: registry-creds
