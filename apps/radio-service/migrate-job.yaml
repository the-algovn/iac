apiVersion: batch/v1
kind: Job
metadata:
  name: radio-lab-migrate
  namespace: radio-service
  annotations:
    # Main-sync wave 1: runs AFTER the wave-0 ExternalSecrets (registry-creds,
    # pg-radio-lab) are materialized. As a PreSync hook it ran BEFORE them, so on
    # a first deploy the pod had no pull secret (private image -> 401) and no
    # PG_URL. Replace=true re-runs it when the image (migration set) changes.
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels: { app: radio-lab-migrate }
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/the-algovn/radio-service:main
          command: ["/usr/local/bin/radio-lab-migrate"]
          env:
            - name: PG_URL
              valueFrom: { secretKeyRef: { name: pg-radio-lab, key: uri } }
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { memory: 128Mi }
      imagePullSecrets:
        - name: registry-creds
