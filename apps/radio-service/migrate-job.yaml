apiVersion: batch/v1
kind: Job
metadata:
  name: radio-lab-migrate
  namespace: radio-service
  annotations:
    # Sync-phase hook at wave 1: runs during the main sync AFTER the wave-0
    # ExternalSecrets (registry-creds, pg-radio-lab) are materialized — a PreSync
    # hook ran before them (private-image 401 + no PG_URL on first deploy).
    # BeforeHookCreation deletes+recreates the Job each sync (re-runs migrations
    # and avoids the immutable-Job-selector error a kubectl replace hits).
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels: { app: radio-lab-migrate }
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/the-algovn/radio-service:main
          command: ["/usr/local/bin/radio-lab-migrate"]
          env:
            - name: PG_URL
              valueFrom: { secretKeyRef: { name: pg-radio-lab, key: uri } }
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { memory: 128Mi }
      imagePullSecrets:
        - name: registry-creds
