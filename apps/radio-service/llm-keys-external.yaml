apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: llm-keys
  namespace: radio-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bao
  target:
    name: llm-keys
    creationPolicy: Owner
  data:
    # Only keys that exist in OpenBao may be listed — a single missing
    # remoteRef fails the WHOLE ExternalSecret and the Secret never
    # materializes. Re-add gemini (algovn/radio-lab/gemini, GEMINI_API_KEY)
    # and google-tts (algovn/radio-lab/google-tts, GOOGLE_TTS_API_KEY) here
    # when those keys are populated.
    - secretKey: anthropic
      remoteRef:
        key: algovn/radio-lab/anthropic
        property: ANTHROPIC_API_KEY
