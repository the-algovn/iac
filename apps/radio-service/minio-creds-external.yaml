apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-creds
  namespace: radio-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bao
  target:
    name: minio-creds
    creationPolicy: Owner
  data:
    - secretKey: access
      remoteRef:
        key: algovn/radio-lab/minio
        property: username
    - secretKey: secret
      remoteRef:
        key: algovn/radio-lab/minio
        property: password
