apiVersion: apps/v1
kind: Deployment
metadata:
  name: redisinsight
  namespace: redisinsight
spec:
  replicas: 1
  selector:
    matchLabels: { app: redisinsight }
  template:
    metadata:
      labels: { app: redisinsight }
    spec:
      containers:
        - name: redisinsight
          image: docker.io/redis/redisinsight:3.6.0
          ports:
            - { containerPort: 5540, name: http }
          env:
            - { name: RI_APP_PORT, value: "5540" }
            - { name: RI_APP_HOST, value: "0.0.0.0" }
            # REQUIRED — not optional. Redis Insight 3.6.0 gates ALL database
            # auto-discovery (including the env pre-seeding below) behind EULA
            # acceptance: without this, /api/databases returns [] forever and
            # the pre-seeded connection silently never appears. The upstream
            # docs list this var's default as "true"; that is WRONG — a live
            # GET /api/settings shows "agreements":null until it is set
            # explicitly. Verified against 3.6.0 on 2026-07-17.
            # Setting it accepts the EULA (SSPL for our use) — the same
            # acceptance you would otherwise click in the UI.
            - { name: RI_ACCEPT_TERMS_AND_CONDITIONS, value: "true" }
            # The connection is pre-seeded from env on EVERY start, which is what
            # makes /data disposable (emptyDir below, no PVC on a backup-less
            # cluster). Redis Insight drops env-added connections on a restart
            # without these vars — that is fine here precisely because they are
            # always set.
            - { name: RI_REDIS_HOST, value: "redis.redis.svc.cluster.local" }
            - { name: RI_REDIS_PORT, value: "6379" }
            - { name: RI_REDIS_ALIAS, value: "algovn-prod" }
            - name: RI_REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: redis-auth, key: password } }
            # No add/edit/delete of connections: this UI can only ever reach the
            # one Redis it was given.
            - { name: RI_DATABASE_MANAGEMENT, value: "false" }
          readinessProbe:
            httpGet: { path: /, port: 5540 }
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 5540 }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          emptyDir: {}
