apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      nodeSelector: { kubernetes.io/arch: amd64 }   # spec §11.1: single pod on w1; local-path PVC pins to first node
      containers:
        - name: redis
          image: docker.io/redis:7.4-alpine
          args:
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            # noeviction (not the default allkeys-lru): counter:global and
            # applied:<id> are load-bearing for the-button's exactly-once
            # accounting (see the-button-service/internal/store/store.go) —
            # evicting one under memory pressure would silently corrupt the
            # public counter the same way a data loss would. maxmemory sits
            # below the 512Mi container limit so Redis rejects writes with an
            # OOM error at the maxmemory ceiling (the service already treats
            # Redis-unavailable as reject-the-batch, failing closed) instead
            # of the kernel OOM-killing the process.
            - --maxmemory
            - 400mb
            - --maxmemory-policy
            - noeviction
          ports:
            - { containerPort: 6379, name: redis }
          env:
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: redis-auth, key: password } }
          readinessProbe:
            exec: { command: [sh, -c, 'redis-cli -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG'] }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec: { command: [sh, -c, 'redis-cli -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG'] }
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 512Mi }
          volumeMounts:
            - { name: data, mountPath: /data }
        - name: exporter
          image: docker.io/oliver006/redis_exporter:v1.86.0
          ports:
            - { containerPort: 9121, name: metrics }
          env:
            - { name: REDIS_ADDR, value: "redis://localhost:6379" }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: redis-auth, key: password } }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { memory: 64Mi }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources: { requests: { storage: 2Gi } }
