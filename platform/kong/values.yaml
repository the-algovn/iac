controller:
  ingressController:
    ingressClass: kong
    resources:
      requests: { cpu: 100m, memory: 192Mi }
      limits: { memory: 512Mi }
gateway:
  image:
    repository: kong
  replicaCount: 1
  proxy:
    type: LoadBalancer
  admin:
    enabled: true           # required for KIC gatewayDiscovery (CONTROLLER_KONG_ADMIN_SVC); headless, not externally reachable
    type: ClusterIP
  manager:
    enabled: false
  secretVolumes:
    - wildcard-algovn-tls
  env:
    database: "off"
    ssl_cert: /etc/secrets/wildcard-algovn-tls/tls.crt
    ssl_cert_key: /etc/secrets/wildcard-algovn-tls/tls.key
    real_ip_header: CF-Connecting-IP
    real_ip_recursive: "on"
    trusted_ips: 10.42.0.0/16
  resources:
    requests: { cpu: 150m, memory: 256Mi }
    limits: { memory: 1Gi }
