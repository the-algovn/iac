fullnameOverride: vm
vmsingle:
  spec:
    retentionPeriod: 15d
    storage:
      accessModes: [ReadWriteOnce]
      resources: { requests: { storage: 20Gi } }
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      # 768Mi OOMKilled repeatedly on algovn-w1 (16 cores vs Pi's 4 — VM sizes internal
      # concurrency buffers per visible CPU, e.g. search.maxConcurrentRequests=16 default;
      # exit 137, 9 restarts on 2026-07-12)
      limits: { memory: 2Gi }
vmagent:
  spec:
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      # 256Mi OOMKilled repeatedly after move to algovn-w1 (exit 137, 31 restarts on 2026-07-12)
      limits: { memory: 512Mi }
vmalert:
  spec:
    resources:
      requests: { cpu: 25m, memory: 64Mi }
      limits: { memory: 128Mi }
alertmanager:
  enabled: true
  spec:
    configSecret: alertmanager-config
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits: { memory: 64Mi }
grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  grafana.ini:
    server:
      root_url: https://grafana.algovn.com
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { memory: 256Mi }
  persistence: { enabled: false }
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.logging.svc.cluster.local:3100
      access: proxy
kubeControllerManager: { enabled: false }
kubeScheduler: { enabled: false }
kubeProxy: { enabled: false }
kubeEtcd: { enabled: false }
# k3s runs a single binary — the sync job still creates scheduler/controller-manager
# alert groups unless disabled explicitly (kube*.enabled only gates scrapes/dashboards).
defaultRules:
  groups:
    kubernetes-system-scheduler: { create: false }
    kubernetes-system-controller-manager: { create: false }
defaultDashboards:
  enabled: true
