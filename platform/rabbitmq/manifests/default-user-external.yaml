apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rabbitmq-default-user
  namespace: rabbitmq
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bao
  target:
    name: rabbitmq-default-user
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: algovn/rabbitmq/rabbitmq-default-user
        property: username
    - secretKey: password
      remoteRef:
        key: algovn/rabbitmq/rabbitmq-default-user
        property: password
