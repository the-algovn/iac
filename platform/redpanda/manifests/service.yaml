apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: redpanda
  labels: { app: redpanda }   # VMServiceScrape selects Services by THEIR labels
spec:
  selector: { app: redpanda }
  ports:
    - { port: 9092, targetPort: 9092, name: kafka }
    - { port: 9644, targetPort: 9644, name: admin }
