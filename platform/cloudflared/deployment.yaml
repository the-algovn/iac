apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels: { app: cloudflared }
  template:
    metadata:
      labels: { app: cloudflared }
    spec:
      nodeSelector: { kubernetes.io/arch: amd64 }
      containers:
        - name: cloudflared
          image: docker.io/cloudflare/cloudflared:2026.7.1
          args: [tunnel, --config, /etc/cloudflared/config/config.yaml, run]
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
          # 2026-07-14 sizing, and an honest note about what it does NOT fix.
          #
          # memory 1536Mi -> 768Mi: WELL EVIDENCED. The original 512Mi OOM was
          # real, but 1536Mi was oversized for a hypothesis that turned out to
          # be wrong. Measured peaks across two ramps: 251Mi and 339Mi/pod, 0
          # restarts. 768Mi keeps >2x headroom; total budget (6x768) equals the
          # old 3x1536.
          #
          # replicas: 2 (was ramped 3 -> 6 during load testing, now scaled back).
          # Replica count DOES NOT RAISE SSE capacity: each pod registers 4 QUIC
          # connections to the edge (connIndex 0-3 in the logs) and this build
          # has no --ha-connections flag. Going 12 -> 24 connections did not move
          # the ~8k 503 wall (it actually went 8,235 -> 5,536, with 3 of 6 pods
          # idle) -- the wall is at the Cloudflare edge / the WiFi uplink w1 uses
          # to reach the router, not our pod count. So we run the minimum plural
          # for deploy safety (a rolling restart replaces one pod at a time
          # instead of dropping every SSE connection). Right-sized for the ~1k
          # CCU expected in reality; the measured ~8k single-IP ceiling is
          # accepted for now. THE REAL LEVER to lift it is wiring w1 to the
          # router over ethernet (it is on WiFi today) -- pending.
          # Evidence: docs/load-results-the-button.md, "Re-test 2".
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 768Mi }
          volumeMounts:
            - { name: config, mountPath: /etc/cloudflared/config, readOnly: true }
            - { name: creds, mountPath: /etc/cloudflared/creds, readOnly: true }
      volumes:
        - name: config
          configMap: { name: cloudflared-config }
        - name: creds
          secret: { secretName: tunnel-credentials }
