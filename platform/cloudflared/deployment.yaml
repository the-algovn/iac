apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 6
  selector:
    matchLabels: { app: cloudflared }
  template:
    metadata:
      labels: { app: cloudflared }
    spec:
      nodeSelector: { kubernetes.io/arch: amd64 }
      containers:
        - name: cloudflared
          image: docker.io/cloudflare/cloudflared:2026.7.1
          args: [tunnel, --config, /etc/cloudflared/config/config.yaml, run]
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
          # 2026-07-14 sizing, and an honest note about what it does NOT fix.
          #
          # memory 1536Mi -> 768Mi: WELL EVIDENCED. The original 512Mi OOM was
          # real, but 1536Mi was oversized for a hypothesis that turned out to
          # be wrong. Measured peaks across two ramps: 251Mi and 339Mi/pod, 0
          # restarts. 768Mi keeps >2x headroom; total budget (6x768) equals the
          # old 3x1536.
          #
          # replicas 3 -> 6: DOES NOT RAISE SSE CAPACITY. Each pod registers 4
          # QUIC connections to the edge (connIndex 0-3 in the logs) and this
          # build has no --ha-connections flag, so replicas are the only lever
          # on edge connection count. We doubled it (12 -> 24) and re-ramped:
          # the 503 wall did NOT move up -- the measured ceiling went 8,235 ->
          # 5,536, and 3 of the 6 pods never received a single stream (idle at
          # 18Mi). The wall is at the Cloudflare edge, is insensitive to our
          # replica count, and varies run to run; a single-source-IP test cannot
          # tell a global tunnel ceiling from a per-IP edge cap. 6 replicas is
          # retained only as cheap redundancy (~18Mi/idle pod) and on the
          # UNPROVEN hypothesis that more edge connections help spread many
          # distinct real client IPs. Do not cite it as headroom.
          # Evidence: docs/load-results-the-button.md, "Re-test 2".
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 768Mi }
          volumeMounts:
            - { name: config, mountPath: /etc/cloudflared/config, readOnly: true }
            - { name: creds, mountPath: /etc/cloudflared/creds, readOnly: true }
      volumes:
        - name: config
          configMap: { name: cloudflared-config }
        - name: creds
          secret: { secretName: tunnel-credentials }
