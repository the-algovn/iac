apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 3
  selector:
    matchLabels: { app: cloudflared }
  template:
    metadata:
      labels: { app: cloudflared }
    spec:
      nodeSelector: { kubernetes.io/arch: amd64 }
      containers:
        - name: cloudflared
          image: docker.io/cloudflare/cloudflared:2026.7.1
          args: [tunnel, --config, /etc/cloudflared/config/config.yaml, run]
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
          # 2026-07-14 load test: 512Mi OOMKilled a pod at ~3.7k QUIC streams
          # (~7.4k total across 2 replicas), implying ~140KB/stream — higher
          # than the ~30-50KB design assumption. Sized for ~5k streams/pod
          # headroom; 3 replicas puts a 10k-stream target at ~3.4k/pod.
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1536Mi }
          volumeMounts:
            - { name: config, mountPath: /etc/cloudflared/config, readOnly: true }
            - { name: creds, mountPath: /etc/cloudflared/creds, readOnly: true }
      volumes:
        - name: config
          configMap: { name: cloudflared-config }
        - name: creds
          secret: { secretName: tunnel-credentials }
