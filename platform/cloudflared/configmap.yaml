apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: algovn-k8s
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      - hostname: "algovn.com"
        service: http://kong-gateway-proxy.kong.svc.cluster.local:80
      - hostname: "*.algovn.com"
        service: http://kong-gateway-proxy.kong.svc.cluster.local:80
      - service: http_status:404
