# OpenBao (Vault-compatible) on the Proxmox host LXC — root of trust for all
# platform secrets. Bootstrap: the eso-bao-approle Secret is created by hand
# once per rebuild (docs/runbooks/secrets.md), never committed.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bao
spec:
  provider:
    vault:
      server: http://192.168.102.124:8200
      path: secret
      version: v2
      auth:
        appRole:
          path: approle
          roleRef:
            name: eso-bao-approle
            namespace: external-secrets
            key: role-id
          secretRef:
            name: eso-bao-approle
            namespace: external-secrets
            key: secret-id
