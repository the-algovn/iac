apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openfga-preshared
  namespace: openfga
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bao
  # defaults spelled out: the openfga app syncs with ServerSideApply, where
  # CRD-defaulted fields register as permanent drift if omitted
  target:
    deletionPolicy: Retain
    name: openfga-preshared
    creationPolicy: Owner
  data:
    - secretKey: keys
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: algovn/openfga/openfga-preshared
        property: keys
