apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openfga-datastore
  namespace: openfga
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bao
  # defaults spelled out: the openfga app syncs with ServerSideApply, where
  # CRD-defaulted fields register as permanent drift if omitted
  target:
    deletionPolicy: Retain
    name: openfga-datastore
    creationPolicy: Owner
  data:
    - secretKey: uri
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: algovn/openfga/openfga-datastore
        property: uri
