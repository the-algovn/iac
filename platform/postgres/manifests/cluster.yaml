apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: postgres
  annotations:
    # A git hiccup must not cascade-delete the database (PV reclaim is Delete)
    argocd.argoproj.io/sync-options: Prune=false
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie
  # Deliberate: LAN admin via psql/DBeaver (homelab threat model) — see runbook
  enableSuperuserAccess: true
  storage:
    storageClass: local-path
    size: 10Gi
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { memory: 2Gi }
  managed:
    roles:
      # createdb: zitadel init probes its DB via CREATE DATABASE (42501 without it; 42P04 "exists" is its success path)
      - name: zitadel
        ensure: present
        login: true
        createdb: true
        passwordSecret: { name: pg-role-zitadel }
      - name: openfga
        ensure: present
        login: true
        passwordSecret: { name: pg-role-openfga }
      - name: the_button
        ensure: present
        login: true
        passwordSecret: { name: pg-role-the-button }
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: pg-lb
            spec:
              type: LoadBalancer
