apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redpanda
  namespace: argocd
  annotations:
    # data-tier dependency like postgres/redis: wave 0 so it is Healthy BEFORE the
    # wave-1 consumers (the-button, api-control-plane) sync — otherwise the-button's
    # PreSync topic Job races a cold Redpanda boot (image pull + init) and exhausts
    # its backoff before the broker is ready.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/the-algovn/iac.git
    targetRevision: main
    path: platform/redpanda/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: redpanda
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
    retry:
      limit: 5
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
