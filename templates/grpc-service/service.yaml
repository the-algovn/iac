apiVersion: v1
kind: Service
metadata:
  name: NAME
  namespace: NAMESPACE
spec:
  clusterIP: None          # headless: enables grpc-go dns:/// round_robin later
  selector: { app: NAME }
  ports:
    - { port: 9090, targetPort: 9090, name: grpc }
    - { port: 9091, targetPort: 9091, name: metrics }
