# Copy to <app-repo>/.github/workflows/build.yaml — builds linux/amd64 image to GHCR.
# amd64-only: the image runs on algovn-w1 but CANNOT fall back to the arm64 Pi during a
# worker outage. Make it multi-arch if that ever matters.
# Tags: vX.Y.Z git tags -> semver image tags; every push to main -> sha-<short> tag.
name: build
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
